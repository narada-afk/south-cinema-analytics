name: Automated Screenshots

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC
    - cron: "0 18 * * *"  # 18:00 UTC
  workflow_dispatch:        # manual trigger

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Node setup ────────────────────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── 3. Pip layer cache (speeds up backend image build) ───────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 4. Install root deps (playwright + wait-on) ──────────────────────────
      - name: Install script deps
        run: npm install

      # ── 5. Install Playwright browser ─────────────────────────────────────────
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # ── 6. Install frontend deps + build ─────────────────────────────────────
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build Next.js
        working-directory: frontend
        env:
          API_URL: http://localhost:8000
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

      # ── 7. Start backend + DB ────────────────────────────────────────────────
      - name: Start backend services
        env:
          POSTGRES_USER: sca
          POSTGRES_PASSWORD: sca
          POSTGRES_DB: sca
          DATABASE_URL: postgresql://sca:sca@postgres:5432/sca
        run: docker compose up -d --build postgres backend

      - name: Wait for backend
        run: npx wait-on http-get://localhost:8000/health --timeout 120000 --interval 3000

      # ── 7c. Seed test data so actor/compare pages render (not 404) ──────────
      - name: Seed test actors
        run: |
          # Run the full seed: creates tables + inserts actors, movies, cast entries
          # Pass DATABASE_URL explicitly so exec picks up the correct Docker hostname
          docker compose exec -T \
            -e DATABASE_URL=postgresql://sca:sca@postgres:5432/sca \
            backend python -m app.seed_data

      # ── 7b. Debug: dump backend logs (always, helps diagnose failures) ────────
      - name: Dump backend logs (debug)
        if: always()
        run: |
          echo "=== docker compose ps ==="
          docker compose ps
          echo "=== backend logs ==="
          docker compose logs backend --tail=80

      # ── 8. Start Next.js ─────────────────────────────────────────────────────
      - name: Start Next.js
        working-directory: frontend
        env:
          API_URL: http://localhost:8000
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run start &

      - name: Wait for Next.js
        run: npx wait-on http-get://localhost:3000 --timeout 60000

      # ── 9. Take screenshots ──────────────────────────────────────────────────
      - name: Run screenshot script
        env:
          SCREENSHOT_URL: http://localhost:3000
        run: node scripts/screenshot.js

      # ── 10. Commit results ─────────────────────────────────────────────────────
      - name: Commit screenshots
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add screenshots/
          git diff --staged --quiet || git commit -m "📸 Automated screenshots $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
