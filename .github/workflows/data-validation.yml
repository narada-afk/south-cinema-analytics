name: Nightly Data Validation

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  validate:
    name: Data integrity checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run validation
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          python -m data_pipeline.validate_integrity \
            --skip-tmdb \
            --report-file /tmp/validation_report.json
        # --skip-tmdb keeps CI fast; remove flag + set TMDB_API_KEY for full check

      - name: Check report for failures
        run: |
          python - <<'EOF'
          import json, sys
          with open("/tmp/validation_report.json") as f:
              report = json.load(f)
          passed = report.get("validation_passed", False)
          critical = report.get("critical_total", -1)
          checks = report.get("checks", {})
          print(f"validation_passed : {passed}")
          print(f"critical_total    : {critical}")
          for name, c in checks.items():
              crit = c.get("critical", c.get("ghost_collabs", 0))
              print(f"  {name:<30} critical={crit}")
          if not passed:
              print("\n❌ Validation FAILED — critical issues found.")
              sys.exit(1)
          print("\n✅ Validation PASSED")
          EOF

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-report-${{ github.run_id }}
          path: /tmp/validation_report.json
          retention-days: 30

      - name: Create GitHub issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT=""
          if [ -f /tmp/validation_report.json ]; then
            REPORT=$(python3 - <<'EOF'
          import json
          with open("/tmp/validation_report.json") as f:
              r = json.load(f)
          lines = [
            f"**Critical issues:** {r.get('critical_total', '?')}",
            f"**Generated at:** {r.get('generated_at', '?')}",
            "",
            "### Check results",
          ]
          for name, c in r.get("checks", {}).items():
              crit = c.get("critical", c.get("ghost_collabs", 0))
              warn = c.get("warning", 0)
              lines.append(f"- **{name}**: critical={crit} warning={warn}")
          print("\n".join(lines))
          EOF
            )
          fi

          gh issue create \
            --title "🚨 Data Validation Failed — $(date +%Y-%m-%d)" \
            --body "## Nightly data validation failed

          Run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ${REPORT}

          ### Next steps
          1. Review the validation report artifact attached to the failed run
          2. Run \`docker compose exec backend python -m data_pipeline.fix_data_issues\` to auto-fix
          3. Re-run this workflow manually to confirm

          > Auto-generated by Nightly Data Validation workflow" \
            --label "data-quality,automated"
