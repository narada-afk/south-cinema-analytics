name: Deploy to Production

on:
  push:
    branches: [main]

# Only run one deploy at a time — cancel in-flight if a newer push arrives
concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    # Wait for CI to pass before deploying
    needs: []   # ci.yml runs in parallel — deploy waits via environment protection
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/cinetrace

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Rebuilding and restarting containers..."
            docker compose -f docker-compose.prod.yml up -d --build

            echo "==> Waiting for backend health..."
            sleep 10
            curl -sf http://localhost:8000/health || (echo "Backend unhealthy!" && exit 1)

            echo "==> Running data fixes..."
            docker compose -f docker-compose.prod.yml exec -T backend python3 /app/data_pipeline/prod_data_fixes.py

            echo "==> Cleaning up old images..."
            docker image prune -f

            echo "✅ Deploy complete"
            docker compose -f docker-compose.prod.yml ps
