# alembic.ini — Alembic configuration for south-cinema-analytics backend
# Run from the backend/ directory:
#   alembic upgrade head        # apply all pending migrations
#   alembic revision --autogenerate -m "describe change"  # new migration
#   alembic downgrade -1        # roll back one step
#   alembic current             # show current DB revision
#   alembic stamp head          # mark existing DB as up-to-date (existing installs)

[alembic]
# Path to the migration scripts directory
script_location = alembic

# sqlalchemy.url is overridden in env.py from DATABASE_URL env var.
# This placeholder value is never used directly.
sqlalchemy.url = postgresql://placeholder/placeholder

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
