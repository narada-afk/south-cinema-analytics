# docker-compose.yml
# Defines three services:
#   1. postgres  — the PostgreSQL database
#   2. backend   — the FastAPI application
#   3. frontend  — the Next.js dashboard
#
# This file is the default dev shortcut (same as docker-compose.dev.yml).
# For explicit dev/prod workflows use:
#   docker compose -f docker-compose.dev.yml up --build
#   docker compose -f docker-compose.prod.yml up -d
#
# To start (dev, quick):
#   cp .env.example .env   # fill in values once
#   docker compose up --build
#
# To seed demo data (run after containers are up):
#   docker compose exec backend python -m app.seed_data

version: "3.9"

services:

  # -------------------------------------------------------------------------
  # PostgreSQL Database
  # DEV ONLY defaults — override via .env in any shared/staging environment
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"               # Expose locally for tools like pgAdmin or DBeaver
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Persist data between restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # FastAPI Backend
  # -------------------------------------------------------------------------
  backend:
    build:
      context: ./backend           # Build from the backend/ folder
    ports:
      - "8000:8000"               # API available at http://localhost:8000
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy  # Wait for Postgres to be ready before starting
    volumes:
      - ./backend:/app            # Mount local code so changes reflect without rebuild

  # -------------------------------------------------------------------------
  # Next.js Frontend  (production build — pre-compiled, fast)
  # -------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend          # Build from the frontend/ folder
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000  # baked into JS bundle at build time
        API_URL: http://backend:8000
    ports:
      - "3000:3000"                # Dashboard available at http://localhost:3000
    environment:
      API_URL: http://backend:8000               # Server-side (SSR/RSC) — Docker internal
      NEXT_PUBLIC_API_URL: http://localhost:8000 # Client-side (browser) — host-exposed
    depends_on:
      - backend
    # No source volume mount — production build is pre-compiled inside the image.
    # To iterate on frontend code run:  cd frontend && npm run dev  (natively, port 3001)
    # then rebuild the image when ready: docker compose up --build frontend

# Named volume to persist Postgres data
volumes:
  postgres_data:
